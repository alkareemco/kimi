name: Build and Release APK

on:
  push:
    branches: [ fix-issue-2 ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK - Release - Notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version and URLs
        id: version
        run: |
          DATE=$(date +"%Y.%m.%d")
          SHA=$(git rev-parse --short HEAD)
          VERSION="v${DATE}-${SHA}"
          APK_NAME="khatam-quran-${VERSION}.apk"
          GH_REPO="${{ github.repository }}"
          DOWNLOAD_URL="https://github.com/${GH_REPO}/releases/download/${VERSION}/${APK_NAME}"
          echo "VERSION=${VERSION}"           >> "$GITHUB_OUTPUT"
          echo "APK_NAME=${APK_NAME}"         >> "$GITHUB_OUTPUT"
          echo "DOWNLOAD_URL=${DOWNLOAD_URL}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Bundle web files into www/
        run: |
          mkdir -p www
          cp index.html sw.js manifest.json www/
          cp -r assets/ www/assets/
          find www -type f

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 --save

      - name: Write capacitor.config.json
        run: |
          echo '{"appId":"com.alkareemco.khatamquran","appName":"Quran Tracker","webDir":"www","server":{"androidScheme":"https"}}' > capacitor.config.json
          cat capacitor.config.json

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          find . -name "*.apk"

      - name: Rename APK with version
        run: |
          APK="${{ steps.version.outputs.APK_NAME }}"
          cp android/app/build/outputs/apk/debug/app-debug.apk "${APK}"
          ls -lh "${APK}"

      - name: Generate QR code PNG
        env:
          DOWNLOAD_URL: ${{ steps.version.outputs.DOWNLOAD_URL }}
        run: |
          pip install "qrcode[pil]" Pillow --quiet
          cat > /tmp/gen_qr.py << 'PYEOF'
import qrcode, os
url = os.environ["DOWNLOAD_URL"]
qr = qrcode.QRCode(version=1, error_correction=qrcode.constants.ERROR_CORRECT_H, box_size=12, border=4)
qr.add_data(url)
qr.make(fit=True)
img = qr.make_image(fill_color="#0A0E14", back_color="#F8F4E9")
img.save("qr-code.png")
print(f"QR saved for: {url}")
PYEOF
          python3 /tmp/gen_qr.py

      - name: URL-encode download URL
        id: encode
        env:
          RAW_URL: ${{ steps.version.outputs.DOWNLOAD_URL }}
        run: |
          cat > /tmp/encode_url.py << 'PYEOF'
import os
from urllib.parse import quote
url = os.environ["RAW_URL"]
encoded = quote(url, safe="")
with open(os.environ["GITHUB_OUTPUT"], "a") as f:
    f.write(f"ENCODED_URL={encoded}\n")
print("URL encoded")
PYEOF
          python3 /tmp/encode_url.py

      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            NOTES=$(git log "${PREV}..HEAD" --pretty=format:"- %s" --no-merges | head -15)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges | head -10)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="- Build from commit $(git rev-parse --short HEAD)"
          fi
          echo "NOTES<<GITDELIM" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "GITDELIM" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Quran Tracker ${{ steps.version.outputs.VERSION }}
          body: |
            ## Quran Tracker ${{ steps.version.outputs.VERSION }}

            ### Install via QR code (easiest)

            ![Download QR](https://api.qrserver.com/v1/create-qr-code/?size=280x280&ecc=H&data=${{ steps.encode.outputs.ENCODED_URL }})

            > Android: Open camera, point at QR code, tap notification. Download starts immediately.

            ### Direct download

            [Download APK - ${{ steps.version.outputs.APK_NAME }}](${{ steps.version.outputs.DOWNLOAD_URL }})

            > First install: Settings > Security > Install unknown apps > allow your browser.

            ---

            ### Changes
            ${{ steps.changelog.outputs.NOTES }}

            ---
            Automated build - commit ${{ github.sha }}
          files: |
            ${{ steps.version.outputs.APK_NAME }}
            qr-code.png
          draft: false
          prerelease: false

      - name: Send email notification via CodeWords
        env:
          WEBHOOK_URL: ${{ secrets.CODEWORDS_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No webhook URL configured, skipping email"
            exit 0
          fi
          VERSION="${{ steps.version.outputs.VERSION }}"
          APK="${{ steps.version.outputs.APK_NAME }}"
          DURL="${{ steps.version.outputs.DOWNLOAD_URL }}"
          RURL="https://github.com/${{ github.repository }}/releases/tag/${VERSION}"
          NOTES=$(echo "${{ steps.changelog.outputs.NOTES }}" | tr '\n' '|' | head -c 400)
          curl -s -f -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" --max-time 30 \
            -d "{\"download_url\":\"${DURL}\",\"version\":\"${VERSION}\",\"release_url\":\"${RURL}\",\"apk_filename\":\"${APK}\",\"release_notes\":\"${NOTES}\",\"app_name\":\"Quran Tracker\"}" \
            && echo "Email notification sent" \
            || echo "Webhook failed (build still succeeded)"
