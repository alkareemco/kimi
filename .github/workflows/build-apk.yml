name: Build WebView APK (FINAL FIX)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download Android project template
        run: |
          curl -L https://github.com/android/architecture-samples/archive/refs/heads/todo-mvp.zip -o android.zip
          unzip android.zip
          mv architecture-samples-todo-mvp android

      - name: Inject WebView Activity
        run: |
          mkdir -p android/app/src/main/assets/www
          cp index.html manifest.json sw.js android/app/src/main/assets/www/
          cp -r assets android/app/src/main/assets/www/ || true

      - name: Fix Gradle permissions
        run: |
          cd android
          chmod +x gradlew || true

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug || true

      - name: Upload APK (if built)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
