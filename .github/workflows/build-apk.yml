name: Build WebView APK CLEAN

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create Android WebView Project (clean)
        run: |
          mkdir -p android/app/src/main/assets/www
          mkdir -p android/app/src/main/java/com/app

          echo "package com.app;" > android/app/src/main/java/com/app/MainActivity.java

          cp index.html manifest.json sw.js android/app/src/main/assets/www/
          cp -r assets android/app/src/main/assets/www/ || true

      - name: Build (simulate safe step)
        run: echo "This step needs real Android Gradle project"

      - name: Upload Web Files
        uses: actions/upload-artifact@v4
        with:
          name: web-files
          path: android/app/src/main/assets/www
