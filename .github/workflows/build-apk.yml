name: Build APK WebView

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Clone Android WebView Template
        run: |
          git clone https://github.com/mitchell-drummond/android-webview-app.git android

      - name: Copy Web Files
        run: |
          mkdir -p android/app/src/main/assets/www
          cp index.html manifest.json sw.js android/app/src/main/assets/www/
          cp -r assets android/app/src/main/assets/www/

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
