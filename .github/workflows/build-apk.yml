name: Build WebView APK FINAL

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Download REAL Android WebView Project
        run: |
          git clone https://github.com/lineageos/android_packages_apps_WebView.git android

      - name: Replace web content
        run: |
          mkdir -p android/app/src/main/assets/www
          cp index.html manifest.json sw.js android/app/src/main/assets/www/
          cp -r assets android/app/src/main/assets/www/ || true

      - name: Fix Gradle permissions
        run: |
          cd android
          chmod +x gradlew || true

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Khatam-Quran-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
