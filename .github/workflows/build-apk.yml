name: Build WebView APK (STABLE FINAL)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download Android WebView Template (REAL PROJECT)
        run: |
          curl -L https://github.com/taoweiji/Android-WebView-Template/archive/refs/heads/master.zip -o android.zip
          unzip android.zip
          mv Android-WebView-Template-master android

      - name: Inject your web app
        run: |
          mkdir -p android/app/src/main/assets/www
          cp index.html manifest.json sw.js android/app/src/main/assets/www/
          cp -r assets android/app/src/main/assets/www/ || true

      - name: Fix permissions
        run: |
          cd android
          chmod +x gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Khatam-Quran-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
