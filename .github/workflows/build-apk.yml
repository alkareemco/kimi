name: Build WebView APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create Android Project from scratch
        run: |
          mkdir -p android/app/src/main/assets/www
          mkdir -p android/app/src/main/java/com/app
          mkdir -p android/app/src/main/res

          cat <<EOF > android/app/src/main/java/com/app/MainActivity.java
package com.app;

import android.os.Bundle;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import android.app.Activity;

public class MainActivity extends Activity {
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);

        WebView webView = new WebView(this);
        webView.getSettings().setJavaScriptEnabled(true);
        webView.setWebViewClient(new WebViewClient());
        webView.loadUrl("file:///android_asset/www/index.html");

        setContentView(webView);
    }
}
EOF

          cp index.html manifest.json sw.js android/app/src/main/assets/www/
          cp -r assets android/app/src/main/assets/www/ || true

      - name: Build status
        run: echo "Project created (but APK requires Gradle setup locally or proper template)"
